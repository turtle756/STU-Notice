<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 - 서울신학대학교 총학생회</title>
  <link rel="stylesheet" href="/admin/static/admin.css">
</head>
<body>
  <header class="admin-header">
    <h1>🎓 서울신학대학교 총학생회 관리자</h1>
    <div class="header-right">
      <span id="saveIndicator" class="save-indicator"></span>
      <button class="btn-preview" onclick="openPreview()">👁 미리보기</button>
      <button class="btn-pull" onclick="showRevertModal()">📥 되돌리기</button>
      <button class="btn-deploy" onclick="showDeployModal()">✅ 적용하기</button>
      <button class="btn-logout" onclick="location.href='/admin/api/logout'">로그아웃</button>
    </div>
  </header>

  <div id="statusBar" class="status-bar">저장되지 않은 변경사항이 있습니다.</div>

  <nav class="admin-nav">
    <button class="active" data-tab="home">🏠 메인</button>
    <button data-tab="schedule">📅 일정</button>
    <button data-tab="events">🎉 행사 & 공모전</button>
    <button data-tab="official-clubs">🏆 정규 동아리</button>
    <button data-tab="clubs">👥 자율 동아리</button>
    <button data-tab="partners">🤝 제휴업체</button>
    <button data-tab="notice">📢 공지 & FAQ</button>
    <button data-tab="sns">📸 SNS 피드</button>
    <button data-tab="files">📁 이미지 관리</button>
  </nav>

  <div class="admin-content">
    <div id="section-home" class="section active"></div>
    <div id="section-schedule" class="section"></div>
    <div id="section-events" class="section"></div>
    <div id="section-official-clubs" class="section"></div>
    <div id="section-clubs" class="section"></div>
    <div id="section-partners" class="section"></div>
    <div id="section-notice" class="section"></div>
    <div id="section-sns" class="section"></div>
    <div id="section-files" class="section"></div>
  </div>

  <div id="revertModal" class="modal-overlay">
    <div class="modal-content">
      <h3>📥 라이브 데이터로 되돌리기</h3>
      <p>현재 배포된(라이브) 데이터로 작업 내용을 되돌립니다.<br>수정 중인 내용이 있으면 사라지니 주의하세요.</p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeRevertModal()">취소</button>
        <button class="btn-pull" onclick="revertToLive()">되돌리기</button>
      </div>
    </div>
  </div>

  <div id="deployModal" class="modal-overlay">
    <div class="modal-content">
      <h3>✅ 적용 확인</h3>
      <p>수정된 내용을 사이트에 즉시 반영합니다.</p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeDeployModal()">취소</button>
        <button class="btn-deploy" onclick="deploy()">적용하기</button>
      </div>
    </div>
  </div>

  <div id="askPullModal" class="modal-overlay">
    <div class="modal-content">
      <h3>📥 라이브 데이터를 불러오시겠습니까?</h3>
      <p>현재 배포된 데이터를 작업 영역으로 동기화합니다.<br>작업 중인 내용이 있으면 덮어씌워질 수 있습니다.</p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="declinePull()">아니오</button>
        <button class="btn-pull" onclick="acceptPull()">예, 동기화</button>
      </div>
    </div>
  </div>

  <div id="imageEditorModal" class="modal-overlay">
    <div class="img-editor-modal">
      <div class="img-editor-header">
        <h3>🖼 이미지 편집</h3>
        <span id="imgEditorSizeHint" class="img-editor-hint"></span>
        <button class="img-editor-close" onclick="closeImageEditor()">&times;</button>
      </div>
      <div class="img-editor-body">
        <div class="img-editor-canvas-wrap">
          <canvas id="imgEditorCanvas"></canvas>
          <div id="cropOverlay" class="crop-overlay" style="display:none">
            <div id="cropBox" class="crop-box">
              <div class="crop-handle nw" data-dir="nw"></div>
              <div class="crop-handle ne" data-dir="ne"></div>
              <div class="crop-handle sw" data-dir="sw"></div>
              <div class="crop-handle se" data-dir="se"></div>
            </div>
          </div>
        </div>
        <div class="img-editor-info">
          <span id="imgEditorOrigSize"></span>
          <span id="imgEditorCropSize" style="display:none"></span>
        </div>
      </div>
      <div class="img-editor-save-options">
        <div class="img-editor-row">
          <label>📁 저장 폴더</label>
          <div class="img-editor-folder-wrap">
            <button type="button" class="fb-trigger-btn" id="imgEditorFolderBtn" onclick="openEditorFolderBrowser()">
              <span class="fb-trigger-icon">📁</span>
              <span id="imgEditorFolderDisplay">image/ (루트)</span>
              <span class="fb-trigger-arrow">▸</span>
            </button>
          </div>
        </div>
        <div class="img-editor-row">
          <label>📝 파일 이름</label>
          <input type="text" id="imgEditorFileName" placeholder="파일 이름 (확장자 자동)">
        </div>
      </div>
      <div class="img-editor-actions">
        <button class="btn-cancel" onclick="closeImageEditor()">취소</button>
        <button id="btnCropMode" class="btn-add" onclick="toggleCropMode()">✂ 자르기</button>
        <button id="btnResize" class="btn-add" onclick="applyResize()">📐 리사이즈</button>
        <button class="btn-deploy" onclick="applyOriginal()">📤 원본 업로드</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/admin/static/admin.js"></script>
</body>
</html>
