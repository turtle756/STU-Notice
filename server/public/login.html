<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 - 서울신학대학교 총학생회</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 3rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .login-card h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #333; }
    .login-card p { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
    .login-card input {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-card input:focus { border-color: #667eea; }
    .login-card button {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .login-card button:hover { opacity: 0.9; }
    .error { color: #e74c3c; margin-top: 0.5rem; font-size: 0.9rem; display: none; }
    .logo { font-size: 2.5rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">🎓</div>
    <h1>관리자 페이지</h1>
    <p>서울신학대학교 총학생회</p>
    <form id="loginForm">
      <input type="password" id="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" autofocus>
      <button type="submit">로그인</button>
      <div class="error" id="error">비밀번호가 틀립니다.</div>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const res = await fetch('/admin/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      if (res.ok) {
        window.location.href = '/admin?askPull=1';
      } else {
        document.getElementById('error').style.display = 'block';
      }
    });
  </script>
</body>
</html>
